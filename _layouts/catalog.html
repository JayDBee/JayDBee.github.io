<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('{{ "/texas.png" | relative_url }}');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
    }

    /* Navigation Bar */
    .navbar {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 0;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .navbar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .navbar li {
      position: relative;
    }

    .navbar a {
      display: block;
      padding: 15px 20px;
      color: #333;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .navbar a:hover {
      background-color: #f0f0f0;
    }

    .content {
      padding: 40px;
      background: rgba(255, 255, 255, 0.2);
      max-width: 800px;
      margin: 120px auto 60px auto; /* Added top margin for navbar */
      border-radius: 12px;
    }

    h1 {
        margin: 0 0 20px 0;
    }

    .navigation {
      margin-bottom: 30px;
    }

    .nav-button {
      display: inline-block;
      margin: 0 10px;
      padding: 14px 22px;
      border-radius: 10px;
      background-color: #0077cc;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .nav-button:hover {
      background-color: #005fa3;
    }

    .course-button {
      display: inline-block;
      margin: 20px;
      padding: 20px 30px;
      border: 2px solid #0077cc;
      border-radius: 8px;
      background-color: #f8f9fa;
      color: #0077cc;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2em;
      transition: all 0.2s ease;
    }

    .course-button:hover {
      background-color: #0077cc;
      color: white;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <ul>
      <li><a href="{{ "/catalog/" | relative_url }}">Catalog</a></li>
      <li><a href="#" onclick="alert('Tools section coming soon!')">Tools</a></li>
      <li><a href="{{ "/support/" | relative_url }}">Support</a></li>
    </ul>
  </nav>

  <div class="content">
    <h1>{{ page.title | default: "Courses" }}</h1>

    <div class="navigation">
      <button onclick="history.back()" class="nav-button">Back</button>
    </div>

    <a href="{{ "/interpretations/" | relative_url }}" class="course-button">Interpretations</a>
    <a href="{{ "/commerce/" | relative_url }}" class="course-button">Commerce</a>

    {{ content }}
  </div>
</body>
</html>
