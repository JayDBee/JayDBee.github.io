<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('{{ "/texas.png" | relative_url }}');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
    }

    /* Navigation Bar */
    .navbar {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 0;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .navbar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .navbar li {
      position: relative;
    }

    .navbar a {
      display: block;
      padding: 15px 20px;
      color: #333;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .navbar a:hover {
      background-color: #f0f0f0;
    }

    /* Dropdown Menu */
    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: rgba(255, 255, 255, 0.95);
      min-width: 200px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      z-index: 1;
      border-radius: 0 0 8px 8px;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      border-bottom: 1px solid #eee;
    }

    .dropdown-content a:hover {
      background-color: #e8f4f8;
    }

    .dropdown-content a:last-child {
      border-bottom: none;
    }

    .content {
      padding: 40px;
      background: rgba(255, 255, 255, 0.2);
      max-width: 800px;
      margin: 120px auto 60px auto; /* Added top margin for navbar */
      border-radius: 12px;
    }

    h1 {
        margin: 0 0 20px 0;
    }

    .navigation {
      margin-bottom: 30px;
    }

    .nav-button {
      display: inline-block;
      margin: 0 10px;
      padding: 14px 22px;
      border-radius: 10px;
      background-color: #0077cc;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .nav-button:hover {
      background-color: #005fa3;
    }

    .lesson-link {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      border: 2px solid #0077cc;
      border-radius: 8px;
      background-color: #f8f9fa;
      color: #0077cc;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .lesson-link:hover {
      background-color: #0077cc;
      color: white;
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <ul>
      <li><a href="{{ "/catalog/" | relative_url }}">Catalog</a></li>
      <li><a href="#" onclick="alert('Tools section coming soon!')">Tools</a></li>
      <li><a href="{{ "/support/" | relative_url }}">Support</a></li>
    </ul>
  </nav>

  <div class="content">
    <h1>{{ page.title | default: "Commerce" }}</h1>

    <div class="navigation">
      <a href="{{ "/" | relative_url }}" class="nav-button">Back to Home</a>
    </div>

    <div class="course-grid">
      {% for item in site.commerce %}
      <a href="{{ item.url | relative_url }}" class="lesson-link">
        {{ item.title | default: item.name }}
      </a>
      {% endfor %}
    </div>

    {{ content }}
  </div>
</body>
</html>
