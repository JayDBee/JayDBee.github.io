<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('../texas.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
    }

    .content {
      padding: 40px;
      background: rgba(255, 255, 255, 0.85);
      max-width: 800px;
      margin: 60px auto;
      border-radius: 12px;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 22px;
      border-radius: 10px;
      background-color: #0077cc;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .back:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Intro</h1>
    <div id="lesson-content">
      <!-- Content will be loaded here from Intro.md -->
    </div>
    <a class="back" href="interpretations.html">Back to Lessons</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('interpretations contents/Intro.md')
      .then(response => response.text())
      .then(text => {
        // Remove front matter if present
        const content = text.replace(/^---[\s\S]*?---\n/, '');
        document.getElementById('lesson-content').innerHTML = marked.parse(content);
      })
      .catch(error => {
        console.error('Error loading content:', error);
        document.getElementById('lesson-content').innerHTML = '<p>Error loading content. Please try again later.</p>';
      });
  </script>
</body>
</html>
