<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('../texas.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
    }

    .content {
      padding: 40px;
      background: rgba(255, 255, 255, 0.85);
      max-width: 900px;
      margin: 60px auto;
      border-radius: 12px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      flex-wrap: wrap;
      margin: 40px auto;
      max-width: 920px;
    }

    .portal {
      width: 220px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      background: #fff;
      text-align: left;
    }

    .portal:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
    }

    .portal img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .portal-body {
      padding: 18px 16px 20px;
    }

    .portal-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin: 0 0 8px;
      color: #222;
      text-transform: capitalize;
    }

    .portal-desc {
      margin: 0;
      font-size: 0.95rem;
      color: #555;
      line-height: 1.4;
    }

    .portal-link {
      display: inline-flex;
      align-items: center;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #0077cc;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      transition: background 0.2s ease;
    }

    .portal-link:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Catalog</h1>
    <p>Pick a section to explore.</p>
  </div>

  <div class="container">
    <div class="portal" onclick="location.href='../index.html'">
      <img src="https://via.placeholder.com/420x140/4d90fe/ffffff?text=Home" alt="Home">
      <div class="portal-body">
        <div class="portal-title">Home</div>
        <p class="portal-desc">Return to the main page.</p>
        <a class="portal-link" href="../index.html">Go Home</a>
      </div>
    </div>

    <div class="portal" onclick="location.href='interpretations.html'">
      <img src="https://via.placeholder.com/420x140/00a884/ffffff?text=Interpretations" alt="Interpretations">
      <div class="portal-body">
        <div class="portal-title">Interpretations</div>
        <p class="portal-desc">Browse the interpretation pages.</p>
        <a class="portal-link" href="interpretations.html">Go to Interpretations</a>
      </div>
    </div>
  </div>
</body>
</html>
