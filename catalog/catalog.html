<!DOCTYPE html>
<html lang="en">
<head>

</head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JayDBee</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('texas.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
    }

<!-- "welcome to my website" -->
    .content {
      padding: 40px;
      background: rgba(255, 255, 255, 0.85);
      max-width: 800px;
      margin: 60px auto;
      border-radius: 12px;
    }

    h1 {
        margin: 0;
    }

    .portal {
        margin: 20px;
        padding: 20px;
        width: 200px;
        height: 200px;
        border: 2px solid #ddd;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s ease;
        background-color: #f4f4f4;
    }

    .portal:hover {
        transform: scale(1.1);
    }

    .portal img {
        width: 100%;
        height: 100%;
        border-radius: 10px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 40px auto;
    }

    .portal-title {
        font-size: 1.2em;
        margin-top: 10px;
    }

    .coming-soon {
        text-align: center;
        padding: 50px;
        font-size: 2em;
        color: #666;
    }

    .portal-page {
        background-color: #f4f4f4;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3em;
        color: #333;
    }
  </style>
</head>

<body>

          <img src="https://via.placeholder.com/200" alt="home">
          <div class="portal-title">previous</div>
      </div>

</body>

</html>
