<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('{{ "/texas.png" | relative_url }}');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
    }

    .content {
      padding: 40px;
      background: rgba(255, 255, 255, 0.85);
      max-width: 800px;
      margin: 60px auto;
      border-radius: 12px;
    }

    h1 {
        margin: 0 0 20px 0;
    }

    .navigation {
      margin-bottom: 30px;
    }

    .nav-button {
      display: inline-block;
      margin: 0 10px;
      padding: 14px 22px;
      border-radius: 10px;
      background-color: #0077cc;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .nav-button:hover {
      background-color: #005fa3;
    }

    .lesson-link {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      border: 2px solid #0077cc;
      border-radius: 8px;
      background-color: #f8f9fa;
      color: #0077cc;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .lesson-link:hover {
      background-color: #0077cc;
      color: white;
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title | default: "Catalogs" }}</h1>

    <div class="navigation">
      <a href="{{ "/" | relative_url }}" class="nav-button">Back to Home</a>
    </div>

    <div class="course-grid">
      {% for i in (site.interpretations) %}
      <a href="{{ i.url | relative_url }}" class="lesson-link">
        {{ i.title }}
      </a>
      {% endfor %}
    </div>

    {{ content }}
  </div>
</body>
</html>
