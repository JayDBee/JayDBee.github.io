<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('{{ "/texas.png" | relative_url }}');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
    }

    .content {
      padding: 40px;
      background: rgba(255, 255, 255, 0.85);
      max-width: 800px;
      margin: 60px auto;
      border-radius: 12px;
    }

    h1 {
        margin: 0 0 20px 0;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 22px;
      border-radius: 10px;
      background-color: #0077cc;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .back:hover {
      background-color: #005fa3;
    }

    .lesson-content {
      text-align: left;
      line-height: 1.6;
    }

    .lesson-content h2 {
      color: #0077cc;
      margin-top: 30px;
      margin-bottom: 15px;
    }

    .lesson-content ul {
      margin-left: 20px;
    }

    .lesson-content p {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title | default: "Lesson" }}</h1>

    <div class="lesson-content">
      {{ content }}
    </div>

    <a class="back" href="{{ "/interpretations/" | relative_url }}">Back to Catalogs</a>
  </div>
</body>
</html>
